name: Publish Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (for example v1.2.3)
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  validate:
    name: Validate (Desktop + Pro)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Desktop typecheck
        run: pnpm -C apps/desktop typecheck

      - name: Desktop tests
        run: pnpm -C apps/desktop test --run

      - name: Pro typecheck
        run: pnpm -C apps/pro-desktop typecheck

      - name: Pro tests
        run: pnpm -C apps/pro-desktop test --run

  build:
    name: Build ${{ matrix.app.name }} Release (${{ matrix.os }})
    needs: [validate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        app:
          - name: desktop
            dir: apps/desktop
          - name: pro
            dir: apps/pro-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install native app dependencies for Electron
        run: pnpm -C ${{ matrix.app.dir }} exec electron-builder install-app-deps

      - name: Build distributables
        run: pnpm -C ${{ matrix.app.dir }} build && pnpm -C ${{ matrix.app.dir }} exec electron-builder --config electron-builder.yml --publish never

      - name: Verify packaged native modules
        run: node ${{ matrix.app.dir }}/scripts/verify-native-packaging.mjs

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.name }}-release-${{ matrix.os }}-${{ env.RELEASE_TAG }}
          path: |
            ${{ matrix.app.dir }}/release/**/*.AppImage
            ${{ matrix.app.dir }}/release/**/*.dmg
            ${{ matrix.app.dir }}/release/**/* Setup *.exe
            ${{ matrix.app.dir }}/release/**/*.deb
            ${{ matrix.app.dir }}/release/**/*.rpm
            ${{ matrix.app.dir }}/release/**/*.zip
            ${{ matrix.app.dir }}/release/**/*.blockmap
            ${{ matrix.app.dir }}/release/**/latest*.yml
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-release-*-${{ env.RELEASE_TAG }}"
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release with notes and assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            release-assets/**/*.AppImage
            release-assets/**/*.dmg
            release-assets/**/* Setup *.exe
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/**/*.zip
            release-assets/**/*.blockmap
            release-assets/**/latest*.yml
